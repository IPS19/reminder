spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: reminder
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          auto: validate
  liquibase:
    default-schema: reminder  # все таблицы Liquibase и твои будут здесь
    liquibase-schema: reminder  # служебные таблицы тоже будут в reminder
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: smothivan@gmail.com
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  quartz:
#    job-store-type: memory  # или jdbc для персистентности
    scheduler-name: myScheduler
    properties:
      org:
        quartz:
          scheduler:
            instanceName: clusteredScheduler
            instanceId: AUTO
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 5
            threadPriority: 5
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
  application:
    name: reminder
app:
  rest:
    url: "/api/v1"
  pagination:
    default-page-size: 10
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}