spring:
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  datasource:
    url: jdbc:postgresql://postgres:5432/reminder_db
  liquibase:
    url: jdbc:postgresql://postgres:5432/reminder_db
server:
  servlet:
    session:
      timeout: 72h  # Время жизни сессии
      cookie:
        http-only: true
        secure: false  # В dev-окружении false, в проде true
        same-site: lax