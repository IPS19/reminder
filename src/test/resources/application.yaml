spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hbm2ddl:
          auto: update
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  mail:
    host: smtp.gmail.com
    port: 587
    username: smothivan@gmail.com
    password: ${GMAIL_PASSWORD}  # пароль приложения (не обычный пароль!)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
